version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      typescript:
        patterns: ["typescript", "@types/*", "vitest", "@vitest/*"]
      react:
        patterns: ["react", "react-dom", "@react-three/*", "three"]
  - package-ecosystem: pip
    directory: /python/origami_lab
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
